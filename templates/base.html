<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Bogos Giro Tippspiel 2026{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css?v=5">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">

    <!-- Logo-Bar: offizielles Giro-Logo prominent -->
    <div class="logo-bar">
      <div class="container logo-bar-inner">
        <a href="/" style="display:flex;align-items:center;gap:1rem;text-decoration:none">
          <img
            src="https://components2.rcsobjects.it/rcs_sport_giro2020-layout/v0/assets/img/ext/logo-giro.svg"
            alt="Giro d'Italia"
            class="giro-official-logo"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
          >
          <!-- Fallback SVG-Logo falls CDN nicht erreichbar -->
          <svg style="display:none;height:52px;width:auto" viewBox="0 0 220 60" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="0" y="0" width="220" height="60" rx="4" fill="none"/>
            <text x="8" y="42" font-family="'Barlow Condensed',sans-serif" font-weight="900" font-size="42" fill="#e8005a" letter-spacing="-1">GIRO</text>
            <text x="114" y="28" font-family="'Barlow Condensed',sans-serif" font-weight="700" font-size="13" fill="rgba(255,255,255,0.7)" letter-spacing="2">D'ITALIA</text>
            <text x="114" y="46" font-family="'Barlow Condensed',sans-serif" font-weight="700" font-size="13" fill="rgba(255,255,255,0.7)" letter-spacing="2">2026</text>
          </svg>
        </a>
        <div class="tippspiel-branding">
          <span class="tippspiel-name">BOGOS Giro Tippspiel <span class="year">2026</span></span>
        </div>
      </div>
    </div>

    <!-- Nav-Bar -->
    <div class="nav-bar">
      <div class="container nav-bar-inner">
        <nav class="main-nav">
          <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Rangliste</a>
          <a href="/etappenplan" class="nav-link {% if request.url.path == '/etappenplan' %}active{% endif %}">Etappenplan</a>
          <a href="/giro" class="nav-link {% if request.url.path == '/giro' %}active{% endif %}">Fahrerliste</a>
          <a href="/admin" class="nav-link nav-admin">Admin</a>
        </nav>
      </div>
    </div>

  </header>

  <main class="main-content">
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Bogos Giro Tippspiel 2026 &mdash; Giro d'Italia 9. Mai &ndash; 1. Juni 2026</p>
    </div>
  </footer>
</body>
</html>
