{% extends "base.html" %}
{% block title %}Admin Login – Bogos Giro Tippspiel 2026{% endblock %}
{% block content %}

<style>
.login-wrap {
  max-width: 360px;
  margin: 3rem auto;
}
.login-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2rem;
}
.login-title {
  font-size: 1.4rem;
  font-weight: 800;
  margin-bottom: .25rem;
  color: var(--text);
}
.login-sub {
  font-size: .85rem;
  color: var(--text-muted);
  margin-bottom: 1.5rem;
}
.login-error {
  background: rgba(220,38,38,.12);
  border: 1px solid rgba(220,38,38,.3);
  color: #f87171;
  border-radius: 8px;
  padding: .65rem 1rem;
  font-size: .85rem;
  margin-bottom: 1rem;
}
.login-label {
  display: block;
  font-size: .8rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: .4rem;
}
.login-input {
  width: 100%;
  background: var(--input-bg, rgba(255,255,255,.06));
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: .65rem 1rem;
  color: var(--text);
  font-size: 1rem;
  outline: none;
  box-sizing: border-box;
  transition: border-color .15s;
}
.login-input:focus {
  border-color: var(--pink);
}
.login-btn {
  width: 100%;
  margin-top: 1.25rem;
  background: var(--pink);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: .75rem 1rem;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: opacity .15s;
}
.login-btn:hover { opacity: .88; }
.lock-icon {
  font-size: 2.5rem;
  text-align: center;
  margin-bottom: 1rem;
}
</style>

<div class="login-wrap">
  <div class="login-card">
    <div class="lock-icon">🔒</div>
    <div class="login-title">Admin-Bereich</div>
    <div class="login-sub">Bogos Giro Tippspiel 2026</div>

    {% if error %}
    <div class="login-error">Falsches Passwort. Bitte erneut versuchen.</div>
    {% endif %}

    <form method="post" action="/admin/login">
      <label class="login-label" for="password">Passwort</label>
      <input
        class="login-input"
        type="password"
        id="password"
        name="password"
        autofocus
        autocomplete="current-password"
        placeholder="••••••••"
      >
      <button class="login-btn" type="submit">Einloggen</button>
    </form>
  </div>
</div>

{% endblock %}
